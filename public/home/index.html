<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Trimax | Health Care Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal: #00c9a7;
      --teal-dim: rgba(0, 201, 167, 0.12);
      --teal-glow: rgba(0, 201, 167, 0.25);
      --gold: #c9a96e;
      --gold-dim: rgba(201, 169, 110, 0.15);
      --bg: #0b0f14;
      --bg2: #111820;
      --glass: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.07);
      --text-primary: #f0ede8;
      --text-muted: rgba(240, 237, 232, 0.45);
      --text-sub: rgba(240, 237, 232, 0.25);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(0, 201, 167, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(201, 169, 110, 0.05) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(15, 25, 35, 0.8) 0%, var(--bg) 100%);
    }

    /* Subtle grid lines */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* Top status bar */
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(11, 15, 20, 0.8);
      backdrop-filter: blur(20px);
      z-index: 10;
      animation: fadeDown 0.8s ease both;
    }

    .status-brand {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-sub);
    }

    .status-dot {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 500;
    }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2.5s ease infinite;
    }

    /* Hero center block */
    .hero {
      text-align: center;
      max-width: 700px;
      width: 100%;
      animation: fadeUp 1s ease 0.2s both;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin-bottom: 18px;
      position: relative;
    }

    .logo span {
      color: var(--teal);
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 56px;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--teal), transparent);
      margin: 0 auto 56px;
      opacity: 0.5;
    }

    /* Info row */
    .info-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .info-cell {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: background 0.3s ease;
    }

    .info-cell:hover {
      background: var(--teal-dim);
    }

    .info-cell + .info-cell {
      border-left: 1px solid var(--glass-border);
    }

    .info-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-sub);
      font-weight: 500;
    }

    .info-value {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      opacity: 0.85;
    }

    .info-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--teal-dim);
      border: 1px solid rgba(0, 201, 167, 0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }

    .info-icon svg {
      width: 13px; height: 13px;
      fill: none;
      stroke: var(--teal);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Bottom footer */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-top: 1px solid var(--glass-border);
      background: rgba(11, 15, 20, 0.8);
      backdrop-filter: blur(20px);
      z-index: 10;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .footer-address {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-sub);
    }

    .footer-powered {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-sub);
    }

    .footer-powered b {
      color: var(--gold);
      font-weight: 500;
    }

    /* Corner ornament */
    .corner {
      position: fixed;
      width: 50px; height: 50px;
      opacity: 0.18;
    }
    .corner-tl { top: 0; left: 0; border-top: 1px solid var(--teal); border-left: 1px solid var(--teal); }
    .corner-tr { top: 0; right: 0; border-top: 1px solid var(--teal); border-right: 1px solid var(--teal); }
    .corner-bl { bottom: 0; left: 0; border-bottom: 1px solid var(--teal); border-left: 1px solid var(--teal); }
    .corner-br { bottom: 0; right: 0; border-bottom: 1px solid var(--teal); border-right: 1px solid var(--teal); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--teal-glow); }
      50% { opacity: 0.6; box-shadow: 0 0 0 5px transparent; }
    }

    @media (max-width: 540px) {
      .info-row { flex-direction: column; }
      .info-cell + .info-cell { border-left: none; border-top: 1px solid var(--glass-border); }
      .status-bar, .footer { padding: 0 20px; }
      .footer-address { display: none; }
    }
  </style>
</head>
<body>

  <!-- Corner ornaments -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Top bar -->
  <header class="status-bar">
    <span class="status-brand">Service API Portal</span>
    <div class="status-dot">
      <div class="pulse"></div>
      System Active
    </div>
  </header>

  <!-- Hero -->
  <div class="wrapper">
    <div class="hero">
      <p class="eyebrow">End-to-End Health Care Solutions</p>
      <h1 class="logo">Tri<span>max</span></h1>
      <p class="subtitle">Operational Workspace</p>
      <div class="divider"></div>

      <div class="info-row">
        <div class="info-cell">
          <div class="info-icon">
            <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2"/></svg>
          </div>
          <span class="info-label">Web Portal</span>
          <span class="info-value">www.moveahead.life</span>
        </div>
        <div class="info-cell">
          <div class="info-icon">
            <svg viewBox="0 0 16 16"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M2 4l6 5 6-5"/></svg>
          </div>
          <span class="info-label">Support</span>
          <span class="info-value">info@moveahead.life</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer-address">C8/116 Block C8, Keshav Puram, Delhi 110035, India</span>
    <span class="footer-powered">Powered by <b>MoveAhead</b></span>
  </footer>

</body>
</html>
